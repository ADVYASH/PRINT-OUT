<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Evidence Report Generator</title>

<style>

body{
font-family:Arial,sans-serif;
margin:20px;
}

.container{
max-width:900px;
margin:auto;
}

input,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

.evidence-box{
border:1px solid #ccc;
padding:15px;
margin-top:15px;
}

#printArea{
display:none;
width:210mm;
min-height:297mm;
margin:auto;
padding:15mm;
background:white;
position:relative;
border:2px solid #000;
box-sizing:border-box;
}

#printArea::before{
content:"";
position:absolute;
top:8mm;
left:8mm;
right:8mm;
bottom:8mm;
border:1px solid #000;
pointer-events:none;
}

.evidence-stamp{
position:absolute;
top:20px;
right:20px;
width:140px;
height:140px;
opacity:0.85;
z-index:999;
transform:rotate(-25deg);
transform-origin:center;
}

.print-photo{
width:170px;
height:auto;
margin:5px;
border:1px solid #000;
}

.evidence-section{
border:2px solid #000;
padding:15px;
margin-top:20px;
margin-bottom:20px;
page-break-inside:avoid;
}

.evidence-section h2{
margin-top:0;
text-align:center;
border-bottom:1px solid #000;
padding-bottom:5px;
}

.photo-container{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.print-photo{
width:170px;
height:auto;
border:1px solid #000;
padding:3px;
}

@media print{

body *{
visibility:hidden;
}

#printArea,
#printArea *{
visibility:visible;
}

#printArea{
display:block !important;
position:absolute;
left:0;
top:0;
width:210mm;
}

button{
display:none;
}

}

.report-stamp{
position:absolute;
top:20px;
right:20px;
width:140px;
height:140px;
border:4px solid red;
border-radius:50%;
color:red;
font-weight:bold;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transform:rotate(-25deg);
opacity:0.75;
font-family:Arial,sans-serif;
line-height:1.2;
overflow:hidden;
word-break:break-word;
padding:10px;
box-sizing:border-box;
}

.report-stamp .stamp-title{
font-size:24px;
}

.report-stamp .stamp-citation{
font-size:11px;
max-width:100%;
overflow-wrap:anywhere;
}
</style>
</head>

<body>

<div class="container">

<h2>Evidence Report Generator</h2>

<input type="text" id="caseName" placeholder="Case Name">

<input type="text" id="mainCitation" placeholder="Main Citation">

<input type="text" id="otherCitation" placeholder="Other Citation">

<input type="date" id="judgementDate">

<div id="evidenceContainer"></div>

<button onclick="addEvidence()">
Add Evidence
</button>

<button onclick="generateReport()">
Generate Report
</button>

<button onclick="window.print()">
Print
</button>

</div>

<div id="printArea"></div>

<script>

let evidenceCount=0;

function addEvidence(){

evidenceCount++;

const div=document.createElement("div");

div.className="evidence-box";

div.innerHTML=`
<h3>Evidence #${String(evidenceCount).padStart(3,'0')}</h3>

<input type="text"
class="title"
placeholder="Evidence Title">

<textarea
class="description"
placeholder="Evidence Description"></textarea>

<input type="file"
class="photos"
multiple
accept="image/*">
`;

document.getElementById("evidenceContainer")
.appendChild(div);

}

function generateReport(){

let html=`

<img src="evidencestamp.png" class="evidence-stamp">

<h1 style="text-align:center;">
EVIDENCE REPORT
</h1>

<p>
<b>Case Name :</b>
${document.getElementById("caseName").value}
</p>

<p>
<b>Main Citation :</b>
${document.getElementById("mainCitation").value}
</p>

<p>
<b>Other Citation :</b>
${document.getElementById("otherCitation").value || "No Other Citation"}
</p>

<p>
<b>Judgement Date :</b>
${document.getElementById("judgementDate").value}
</p>

`;

const boxes=document.querySelectorAll(".evidence-box");

boxes.forEach((box,index)=>{

html+=`
<div class="evidence-section">

<h2>
EVIDENCE #${String(index+1).padStart(3,'0')}
</h2>

<p>
<b>Title:</b>
${box.querySelector(".title").value}
</p>

<p>
${box.querySelector(".description").value}
</p>
`;

const files=
box.querySelector(".photos").files;

for(let file of files){

const url=URL.createObjectURL(file);

html+=`
<img src="${url}"
class="print-photo">
`;
}

html+=`
<hr>
</div>
`;

});

document.getElementById("printArea").innerHTML=html;
document.getElementById("printArea").style.display="block";

}

addEvidence();

</script>

</body>
</html>
