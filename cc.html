<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Legal Document Generator</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0 15px;
}

button{
padding:10px 20px;
background:#0f2027;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#b8860b;
color:black;
}

/* PRINT AREA */

.print-area{
display:none;
width:210mm;
min-height:297mm;
background:white;
}

.page{
width:210mm;
min-height:297mm;
padding:0 20mm 20mm 20mm;
page-break-after:always;
position:relative;
}

/* WATERMARK */

.watermark{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
opacity:0.05;
}

/* COURT HEADER */

.header{
text-align:center;
margin-bottom:20px;
}

.case-heading{
font-family:'UnifrakturCook';
font-size:40px;
}

/* STAMP IMAGE */

.stamp-image{
width:100%;
margin:0;
padding:0;
}

.stamp-image img{
width:210mm;
height:auto;
display:block;
}

/* PRINT SETTINGS */

@media print{

body{
background:white;
}

.container{
display:none;
}

.print-area{
display:block;
}

}

@page{
size:A4;
margin:0;
}
  
</style>

</head>

<body>

<div class="container">

<h2>Legal Document Generator</h2>

<label>Case Number</label> <input id="caseNumber">

<label>Petitioner</label> <input id="petitioner">

<label>Respondent</label> <input id="respondent">

<label>Advocate (Petitioner)</label> <input id="petAdv">

<label>Advocate (Respondent)</label> <input id="resAdv">

<label>Date of Judgment</label> <input type="date" id="date">

<label>Bench</label> <input id="bench">

<label>Judgment By</label> <input id="judgmentBy">

<label>Description (Stamp)</label>

<textarea id="description"></textarea>

<label>First Party</label> <input id="firstParty">

<label>Second Party</label> <input id="secondParty">

<label>Amount</label> <input id="amount">

<button onclick="generate()">Generate & Print</button>

</div>

<!-- PRINT AREA -->

<div class="print-area">

<!-- PAGE 1 : E-STAMP WITH PHOTO -->

<div class="page">

<div class="watermark">STAMP</div>

<div class="stamp-image">
<img src="estamp.jpg">
</div>

<div style="text-align:center">
<h1 style="font-family:'UnifrakturCook';font-size:42px;">INDIA NON JUDICIAL</h1>
</div>

<div id="stampContent"></div>

</div>

<!-- PAGE 2 : COURT DOCUMENT (NO PHOTO) -->

<div class="page">

<div class="watermark">सत्यमेव जयते</div>

<div class="header">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" width="80">

<h2>IN THE SUPREME COURT OF INDIA</h2>

<h2 class="case-heading">CASE DETAILS</h2>

</div>

<div id="courtContent"></div>

</div>

</div>

<script>

function generate(){

let caseNumber=document.getElementById("caseNumber").value;
let petitioner=document.getElementById("petitioner").value;
let respondent=document.getElementById("respondent").value;
let petAdv=document.getElementById("petAdv").value;
let resAdv=document.getElementById("resAdv").value;
let date=document.getElementById("date").value;
let bench=document.getElementById("bench").value;
let judgmentBy=document.getElementById("judgmentBy").value;

let description=document.getElementById("description").value;
let first=document.getElementById("firstParty").value;
let second=document.getElementById("secondParty").value;
let amount=document.getElementById("amount").value;

let now=new Date().toLocaleString();

/* STAMP PAGE */

document.getElementById("stampContent").innerHTML=`

<p><b>Certificate Issued Date:</b> ${now}</p>

<p><b>Description:</b> ${description}</p>

<p><b>First Party:</b> ${first}</p>

<p><b>Second Party:</b> ${second}</p>

<p><b>Consideration Amount:</b> ${amount}</p>

<p><b>Stamp Duty:</b> 100 Rs</p>

`;

/* COURT PAGE */

document.getElementById("courtContent").innerHTML=`

<p><b>Case Number:</b> ${caseNumber}</p>

<p><b>Petitioner:</b> ${petitioner}</p>

<p><b>Respondent:</b> ${respondent}</p>

<p><b>Advocate for Petitioner:</b> ${petAdv}</p>

<p><b>Advocate for Respondent:</b> ${resAdv}</p>

<p><b>Date of Judgment:</b> ${date}</p>

<p><b>Bench:</b> ${bench}</p>

<p><b>Judgment By:</b> ${judgmentBy}</p>

`;

window.print();

}

</script>

</body>
</html>
