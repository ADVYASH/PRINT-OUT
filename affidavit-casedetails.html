<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affidavit Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f0f0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.form-section{
    background:#fff;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

input, textarea{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}

textarea{
    height:70px;
}

button{
    padding:12px 25px;
    border:none;
    background:#000;
    color:#fff;
    cursor:pointer;
    border-radius:5px;
    margin-top:10px;
    margin-right:10px;
}

#a4{
    background:white;
    width:210mm;
    height:297mm;
    margin:auto;
    padding:15mm;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.affidavit-title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.content{
    font-size:13px;
    line-height:1.45;
    text-align:justify;
}

.verification{
    margin-top:20px;
}

.signature{
    margin-top:40px;
    text-align:right;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .form-section,
    .print-btn{
        display:none;
    }

    #a4{
        box-shadow:none;
        margin:0;
        width:100%;
        height:auto;
        padding:15mm;
    }

    @page{
        size:A4;
        margin:10mm;
    }
}

#a4{
    position:relative;
}

.affidavit-seal{
    position:absolute;
    top:10mm;
    right:10mm;
    width:120px;
    height:120px;
    border:5px double #b30000;
    border-radius:50%;
    color:#b30000;
    background:rgba(255,255,255,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:900;
    font-size:12px;
    line-height:1.3;
    transform:rotate(-22deg);
    text-transform:uppercase;
    z-index:10;
    padding:10px;
    box-sizing:border-box;
}

.affidavit-seal::before{
    content:"";
    position:absolute;
    top:6px;
    left:6px;
    right:6px;
    bottom:6px;
    border:2px solid #b30000;
    border-radius:50%;
}

.affidavit-title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:20px;
    margin-bottom:20px;
}

#affidavitContent b{
    color:black;
    font-weight:bold;
    text-decoration:none;
}
.affidavit-title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:20px;
    margin-bottom:20px;
}

.offence-circle{
    display:inline-block;
    min-width:90px;
    min-height:90px;
    padding:10px;
    border:2px solid black;
    border-radius:50%;
    color:black;
    font-weight:bold;
    text-align:center;
    line-height:1.2;
    vertical-align:middle;

    display:inline-flex;
    align-items:center;
    justify-content:center;
}

.category-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

.category-row label{
    display:flex;
    align-items:center;
    gap:5px;
}
</style>
</head>
<body>

<div class="container">

<div class="form-section">

<h1>Affidavit Generator</h1>

<div class="grid">

<input id="caseName" placeholder="Case Name">
<input id="caseNo" placeholder="Case Number">
<input id="courtName" placeholder="Court Name">
<input id="courtState" placeholder="Court State">

<input id="bench" placeholder="On Bench">
<input id="judgmentBy" placeholder="Judgment By">
<label>Judgment Date (Court Decision Date)</label>
<input type="date" id="judgmentDate">
<input id="citationNo" placeholder="Citation Number">

<input id="petitioners" placeholder="Petitioner Names">
<input id="petAdv" placeholder="Petitioner Advocates">

<input id="respondents" placeholder="Respondent Names">
<input id="resAdv" placeholder="Respondent Advocates">

<input id="firNo" placeholder="FIR Number">
<label>FIR Registration Date</label>
<input type="date" id="firDate">
<input id="policeStation" placeholder="Police Station">

<input id="sections" placeholder="Sections Included">
<input
    type="text"
    id="nature"
    placeholder="Enter Type of Offence / Dispute">

<input id="proceedingLocation" placeholder="Case Proceeding Location">

</div>

<div style="margin-top:15px;">
    <label><b>Case Category</b></label>

    <div class="category-row">
        <label>
            <input type="radio" name="caseCategory" value="Core Critical" checked>
            Core Critical (₹1000)
        </label>

        <label>
            <input type="radio" name="caseCategory" value="Crucial">
            Crucial (₹500)
        </label>

        <label>
            <input type="radio" name="caseCategory" value="Specialized">
            Specialized (₹200)
        </label>

        <label>
            <input type="radio" name="caseCategory" value="Procedural">
            Procedural (₹100)
        </label>
    </div>
</div>

<button onclick="generateAffidavit()">Generate Affidavit</button>
<button class="print-btn" onclick="window.print()">Print Affidavit</button>

</div>

<div id="a4">

<div class="affidavit-seal" id="sealText">
AFFIDAVIT<br>N/A
</div>

<div class="affidavit-title">
<strong>AFFIDAVIT</strong>
</div>

<div id="affidavitContent" class="content">

Generate affidavit to preview here.

</div>

</div>

</div>

<script>

function getStampAmount(){

    const category =
    document.querySelector('input[name="caseCategory"]:checked')?.value;

    switch(category){

        case "Core Critical":
            return 1000;

        case "Crucial":
            return 500;

        case "Specialized":
            return 200;

        case "Procedural":
            return 100;

        default:
            return 100;
    }
}

function na(v){
    return v.trim() === "" ? "N/A" : v.trim();
}

function generateAffidavit(){

const d = new Date();

const day = String(d.getDate()).padStart(2,'0');
const month = d.toLocaleString('en-US',{month:'long'});
const year = d.getFullYear();

const judgmentDate =
document.getElementById('judgmentDate').value.trim() || 'N/A';

document.getElementById("sealText").innerHTML =
`AFFIDAVIT<br>${judgmentDate}`;

const stampAmount = getStampAmount();

const caseCategory =
document.querySelector('input[name="caseCategory"]:checked')?.value || "N/A";

let html = `

<p>
I, <strong>Yash Kumar</strong>, aged about <strong>21 years</strong>, resident of <strong>Delhi</strong>, do hereby solemnly affirm and state as follows:
</p>

<br>

<p>
That I have examined the records, pleadings, First Information Report, orders, and judgment pertaining to the matter titled <b>${na(document.getElementById('caseName').value)}</b>, bearing Case No. <b>${na(document.getElementById('caseNo').value)}</b>, adjudicated by the <b>${na(document.getElementById('courtName').value)}</b> within the State of <b>${na(document.getElementById('courtState').value)}</b>. The matter was heard by the Hon'ble Bench comprising <b>${na(document.getElementById('bench').value)}</b>, and the judgment was pronounced by <b>${na(document.getElementById('judgmentBy').value)}</b> on <b>${na(document.getElementById('judgmentDate').value)}</b>, reported as Citation No. <b>${na(document.getElementById('citationNo').value)}</b>.
</p>

<br>

<p>
The petitioner(s) in the aforesaid matter are <b>${na(document.getElementById('petitioners').value)}</b>, represented through learned counsel <b>${na(document.getElementById('petAdv').value)}</b>, while the respondent(s) are <b>${na(document.getElementById('respondents').value)}</b>, represented through learned counsel <b>${na(document.getElementById('resAdv').value)}</b>.
</p>

<br>

<p>
The proceedings arise out of FIR No. <b>${na(document.getElementById('firNo').value)}</b>, dated <b>${na(document.getElementById('firDate').value)}</b>, registered at <b>${na(document.getElementById('policeStation').value)}</b> Police Station, under Sections <b>${na(document.getElementById('sections').value)}</b>.
</p>
<p>
The case pertains to the nature of offence/dispute, namely <b>${na(document.getElementById('nature').value)}</b>, and the proceedings are presently pending before/at <b>${na(document.getElementById('proceedingLocation').value)}</b>.That the requisite stamp duty of
<b>₹${stampAmount}</b>
has been duly paid by the Petitioner/Deponent as applicable to the nature of dispute/offence mentioned herein.
</p>
<p>
Based upon my examination of the available records and documents, I state that the particulars set forth herein accurately reflect the details of the aforesaid case and are true and correct to the best of my knowledge, information, and belief.
</p>
<p>
The case pertains to the nature of offence/dispute, namely
<span class="offence-circle">
${na(document.getElementById('nature').value)}
</span>.
</p>
<br>
<div class="verification">
<br>
<b>VERIFICATION</b>

<br>

<p>
I, the above-named Deponent, do hereby verify that the contents of the foregoing affidavit are true and correct to the best of my knowledge, information, and belief, derived from the records examined by me, and that no material fact has been concealed or suppressed therefrom.
</p>

<br>

<p>
Verified at <strong>DELHI</strong> on this <b>${day}</b> day of <b>${month}</b>, <b>${year}</b>.
</p>

<div class="signature">

<b>DEPONENT</b>

<br><br><br>

(Signature)

</div>

</div>
`;

document.getElementById("affidavitContent").innerHTML = html;

}

generateAffidavit();
document.getElementById('judgmentDate').addEventListener('input', function(){

document.getElementById('sealText').innerHTML =
`AFFIDAVIT<br>${this.value || 'N/A'}`;

});
</script>

</body>
</html>
