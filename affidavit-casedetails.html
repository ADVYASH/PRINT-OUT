<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f0f0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.form-section{
    background:#fff;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

input, textarea{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}

textarea{
    height:70px;
}

button{
    padding:12px 25px;
    border:none;
    background:#000;
    color:#fff;
    cursor:pointer;
    border-radius:5px;
    margin-top:10px;
    margin-right:10px;
}

#a4{
    background:white;
    width:210mm;
    height:297mm;
    margin:auto;
    padding:15mm;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.affidavit-title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.content{
    font-size:13px;
    line-height:1.45;
    text-align:justify;
}

.verification{
    margin-top:20px;
}

.signature{
    margin-top:40px;
    text-align:right;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .form-section,
    .print-btn{
        display:none;
    }

    #a4{
        box-shadow:none;
        margin:0;
        width:100%;
        height:auto;
        padding:15mm;
    }

    @page{
        size:A4;
        margin:10mm;
    }
}

#a4{
    position:relative;
}

.affidavit-seal{
    position:absolute;
    top:10mm;
    right:10mm;
    width:120px;
    height:120px;
    border:5px double #b30000;
    border-radius:50%;
    color:#b30000;
    background:rgba(255,255,255,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:900;
    font-size:12px;
    line-height:1.3;
    transform:rotate(-22deg);
    text-transform:uppercase;
    z-index:10;
    padding:10px;
    box-sizing:border-box;
}

.affidavit-seal::before{
    content:"";
    position:absolute;
    top:6px;
    left:6px;
    right:6px;
    bottom:6px;
    border:2px solid #b30000;
    border-radius:50%;
}

.affidavit-title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:20px;
    margin-bottom:20px;
}
</style>
</head>

<input
    list="caseTypes"

<datalist id="caseTypes"></datalist>

<input id="proceedingLocation" placeholder="Case Proceeding Location">

</div>

<button onclick="generateAffidavit()">Generate Affidavit</button>
<button class="print-btn" onclick="window.print()">Print Affidavit</button>

</div>

function generateAffidavit(){

const d = new Date();

const day = String(d.getDate()).padStart(2,'0');
const month = d.toLocaleString('en-US',{month:'long'});
const year = d.getFullYear();

const judgmentDate =
document.getElementById('judgmentDate').value.trim() || 'N/A';

document.getElementById("sealText").innerHTML =
`AFFIDAVIT<br>${judgmentDate}`;

const stampAmount = getStampAmount();

let html = `

<p>
I, Yash Kumar, aged about 21 years, resident of Delhi, do hereby solemnly affirm and state as follows:
</p>

<br>

<p>

</p>

<br>

<p>
The petitioner(s) in the aforesaid matter are <b>${na(document.getElementById('petitioners').value)}</b>, represented through learned counsel <b>${na(document.getElementById('petAdv').value)}</b>, while the respondent(s) are <b>${na(document.getElementById('respondents').value)}</b>, represented through learned counsel <b>${na(document.getElementById('resAdv').value)}</b>.
</p>

<br>

<p>
The proceedings arise out of FIR No. <b>${na(document.getElementById('firNo').value)}</b>, dated <b>${na(document.getElementById('firDate').value)}</b>, registered at <b>${na(document.getElementById('policeStation').value)}</b> Police Station, under Sections <b>${na(document.getElementById('sections').value)}</b>.
</p>

<br>

<p>

</p>

<p>

<b>₹${stampAmount}</b>

</p>

<div class="verification">

<b>VERIFICATION</b>

<br>

<p>

<br><br><br>

(Signature)

</div>

</div>
