<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Important</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      background-color: #000;
      font-family: 'Arial', sans-serif;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Title Styling with flicker effect */
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
      animation: flicker 1.5s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      100% { opacity: 0.8; }
    }

    /* Neon Buttons with glow animation */
    .neon-button {
      position: relative;
      display: inline-block;
      background-color: transparent;
      border: 2px solid #0ff;
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      color: #0ff;
      cursor: pointer;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
      box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
      transition: all 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
      overflow: hidden;
    }

    /* Hover effect with ripple animation and glow intensify */
    .neon-button:hover {
      background-color: #0ff;
      color: #000;
      box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff, 0 0 100px #0ff;
    }

    /* Ripple effect on hover */
    .neon-button::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(0, 255, 255, 0.3);
      opacity: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
      pointer-events: none;
    }

    .neon-button:hover::after {
      transform: translate(-50%, -50%) scale(2.5);
      opacity: 1;
    }

    /* Optional: Add pulsate animation to buttons */
    @keyframes pulse {
      0% { box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; }
      50% { box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff, 0 0 120px #0ff; }
      100% { box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; }
    }

    /* Apply pulsate animation on load */
    .neon-button {
      animation: pulse 2s infinite alternate;
    }
  </style>
</head>
<body>
  <h1>👣🫆👉Court Work👈🫆👣
</h1>
  <a href="aa.html" class="neon-button">Affidavit</a>
  <a href="bb.html" class="neon-button">Button 2</a>
  <a href="cc.html" class="neon-button">Button 3</a>
  <a href="dd.html" class="neon-button">Button 4</a>
  <a href="ee.html" class="neon-button">Button 5</a>
</body>
</html>
