<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supreme Court of India</title>

<style>

/* ================== STAR BACKGROUND ================== */

body{
    font-family:"Times New Roman", serif;
    margin:0;
    padding:20px 20px 20px 190px;
    overflow-x:hidden;
    color:white;
    background:black;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ================== SIDE CONTROLS ================== */

.sideControls{
    position:fixed;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:1000;
}

.sideControls button{
    padding:10px;
    background:rgba(0,0,0,0.6);
    border:1px solid #00ffff;
    color:#00ffff;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s ease;
}

.sideControls button:hover{
    background:#00ffff;
    color:black;
    box-shadow:0 0 15px #00ffff;
    transform:translateX(5px);
}

/* ================== ASSIGNMENT CARD ================== */

.assignment{
    max-width:800px;
    margin:30px auto;
    padding:30px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    animation:fadeUp 0.6s ease;
    page-break-after:always;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* ================== TEXT STYLES ================== */

.heading{
    font-size:32px;
    font-weight:bold;
    text-align:center;
    margin:15px 0;
    color:#00ffff;
}

.subtitle{
    font-size:20px;
    font-style:italic;
    text-align:center;
    margin:10px 0;
    color:#ff00ff;
}

.subheading{
    font-size:18px;
    font-weight:bold;
    margin:15px 0 5px 0;
    color:#ffff00;
}

.body{
    font-size:16px;
    text-align:justify;
    margin-bottom:10px;
    color:#ffffff;
}

/* ================== SLOT ================== */

.slot{
    position:relative;
    padding-right:40px;
    margin-bottom:10px;
    transition:0.3s;
}

.slot:focus{
    outline:none;
    box-shadow:0 0 20px #00ffff;
    transform:scale(1.02);
}

/* Delete & Paste */
.deleteBtn{
    position:absolute;
    top:5px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
}

.deleteBtn:first-of-type{
    right:5px;
    color:red;
}

.deleteBtn:last-of-type{
    right:30px;
    color:#00ff00;
}

/* ================== CUSTOM SPACING ================== */

.subtitle + .subheading{
    margin-top:40px;
}

.body + .subheading{
    margin-top:30px;
}

/* ================== PARTICLES ================== */

.particle{
    position:fixed;
    width:6px;
    height:6px;
    border-radius:50%;
    pointer-events:none;
    animation:floatUp 1s linear forwards;
}

@keyframes floatUp{
    from{opacity:1; transform:translateY(0) scale(1);}
    to{opacity:0; transform:translateY(-40px) scale(0.5);}
}

.cursorTrail{
    position:fixed;
    width:10px;
    height:10px;
    border-radius:50%;
    pointer-events:none;
    animation:fadeTrail 0.6s linear forwards;
}

@keyframes fadeTrail{
    from{opacity:1;}
    to{opacity:0;}
}

/* ================== PRINT MODE ================== */

@media print{
    body{
        background:white !important;
        color:black !important;
        padding:0;
    }

    canvas,
    .sideControls,
    .deleteBtn{
        display:none;
    }

    .assignment{
        box-shadow:none !important;
        background:white !important;
        color:black !important;
    }

    .heading,
    .subtitle,
    .subheading,
    .body{
        color:black !important;
    }
}

</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="sideControls">
    <button onclick="addAssignment()">+ Assignment</button>
    <button onclick="addHeading()">+ Heading</button>
    <button onclick="addSubtitle()">+ Subtitle</button>
    <button onclick="addSubheading()">+ Subheading</button>
    <button onclick="addBody()">+ Body</button>
    <button onclick="resetAll()">Reset</button>
    <button onclick="window.print()">Print</button>
</div>

<div id="mainArea"></div>

<script>

/* ================== STAR ANIMATION ================== */

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let stars = [];

class Star{
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2;
        this.speed = Math.random()*1 + 0.5;
    }

    update(){
        this.y += this.speed;
        if(this.y > canvas.height){
            this.y = 0;
            this.x = Math.random()*canvas.width;
        }
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle="white";
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<500;i++){
    stars.push(new Star());
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{
        star.update();
        star.draw();
    });

    requestAnimationFrame(animate);
}

animate();

/* ================== EDITOR JS ================== */

let currentAssignment = null;

function addAssignment(){
    let div = document.createElement("div");
    div.className = "assignment";
    document.getElementById("mainArea").appendChild(div);
    currentAssignment = div;
}

function createSlot(className, defaultText){
    if(!currentAssignment){
        alert("First add an Assignment!");
        return;
    }

    let element = document.createElement("div");
    element.className = className + " slot";
    element.contentEditable = "true";
    element.innerHTML = defaultText;

    let deleteBtn = document.createElement("span");
    deleteBtn.innerHTML = "✖";
    deleteBtn.className = "deleteBtn";
    deleteBtn.contentEditable = "false";
    deleteBtn.onclick = function(){ element.remove(); };

    let pasteBtn = document.createElement("span");
    pasteBtn.innerHTML = "📋";
    pasteBtn.className = "deleteBtn";
    pasteBtn.contentEditable = "false";
    pasteBtn.onclick = async function(){
        try{
            const text = await navigator.clipboard.readText();
            element.innerText = text;
        }catch(err){
            alert("Clipboard access denied!");
        }
    };

    element.appendChild(deleteBtn);
    element.appendChild(pasteBtn);
    currentAssignment.appendChild(element);
}

function addHeading(){ createSlot("heading","Heading"); }
function addSubtitle(){ createSlot("subtitle","Subtitle"); }
function addSubheading(){ createSlot("subheading","Subheading"); }
function addBody(){ createSlot("body","Write body content here..."); }

function resetAll(){
    if(confirm("Delete ALL assignments?")){
        document.getElementById("mainArea").innerHTML="";
        currentAssignment=null;
    }
}

/* Typing particles */
document.addEventListener("input", function(e){
    if(e.target.classList.contains("slot")){
        let rect = e.target.getBoundingClientRect();
        let particle=document.createElement("div");
        particle.className="particle";

        let colors=["#00ffff","#ff00ff","#ffff00","#00ff00"];
        particle.style.background=colors[Math.floor(Math.random()*colors.length)];
        particle.style.left=(rect.left + Math.random()*rect.width)+"px";
        particle.style.top=(rect.top + Math.random()*rect.height)+"px";

        document.body.appendChild(particle);
        setTimeout(()=>{ particle.remove(); },1000);
    }
});

/* Cursor glow */
document.addEventListener("mousemove",function(e){
    let trail=document.createElement("div");
    trail.className="cursorTrail";

    let colors=["#00ffff","#ff00ff","#ffff00"];
    trail.style.background=colors[Math.floor(Math.random()*colors.length)];
    trail.style.left=e.pageX+"px";
    trail.style.top=e.pageY+"px";

    document.body.appendChild(trail);
    setTimeout(()=>{ trail.remove(); },600);
});

</script>

</body>
</html>
